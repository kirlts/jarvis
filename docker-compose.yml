  # ── Core Async Worker (pg-boss) ────────────────────────────────────────
  core-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis-core-worker
    command: ["node", "src/workers/boss-worker.js"]
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres_sandbox
      DB_NAME: jarvis
      BOSS_DATABASE_URL: "postgresql://postgres:postgres_sandbox@db:5432/jarvis"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - jarvis-net

  # ── WhatsApp Baileys Worker (Isolated Container) ───────────────────
  baileys-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "src/workers/baileys/worker.js"]
    container_name: jarvis-baileys-worker
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      # Direct PG connection for AuthState persistence (WAPP.FN.01)
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres_sandbox
      DB_NAME: jarvis
      # Pooler connection for application queries
      POOLER_HOST: pooler
      POOLER_PORT: "5432"
      # Hardcoded session for Phase 1 testing
      WAPP_TENANT_ID: "01905555-5555-7555-8555-555555555556"
      WAPP_SESSION_ID: "01905555-5555-7555-8555-555555555560"
      BOSS_DATABASE_URL: "postgresql://postgres:postgres_sandbox@db:5432/jarvis"
      STORAGE_ENDPOINT: "http://storage:9000"
      STORAGE_ACCESS_KEY: "minioadmin"
      STORAGE_SECRET_KEY: "minioadmin_sandbox"
      STORAGE_BUCKET: "jarvis-files"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - jarvis-net


  # ── Edge Proxy (Caddy) ────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: jarvis-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - jarvis-net
    depends_on:
      - core-api
  # ── Observability (Loki) ───────────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: jarvis-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/observability/loki-config.yaml:/etc/loki/loki-config.yaml
      - loki_data:/loki
    networks:
      - jarvis-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Observability (Grafana) ────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: jarvis-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=grafana_sandbox
      - GF_AUTH_ANONYMOUS_ENABLED=false
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/observability/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - jarvis-net
    depends_on:
      - loki

  # ── Observability (Uptime Kuma) ────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: jarvis-uptime-kuma
    restart: unless-stopped
    ports:
      - "3002:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - jarvis-net

  # ── Zero-Touch Provisioner ─────────────────────────────────────────────
  # Runs the Appsmith and Uptime Kuma python setup scripts automatically.
  # Requires wait-for-it logic since Appsmith takes ~30-60s to boot.
  provisioner:
    image: mcr.microsoft.com/playwright/python:v1.43.0-jammy
    container_name: jarvis-provisioner
    volumes:
      - ./scripts:/app/scripts
    working_dir: /app
    command: >
      bash -c "
      echo 'Waiting for Uptime Kuma to be ready...';
      until curl -s http://uptime-kuma:3001 | grep -q '<title>'; do sleep 5; done;
      echo 'Uptime Kuma is up. Installing dependencies...';
      pip install uptime-kuma-api --quiet;
      python3 scripts/provision_kuma.py;
      "
    networks:
      - jarvis-net
    depends_on:
      - uptime-kuma

volumes:
  db_data:
    driver: local
  storage_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

  loki_data:
    driver: local
  grafana_data:
    driver: local
  uptime_kuma_data:
    driver: local

networks:
  jarvis-net:
    driver: bridge
    name: jarvis-net
