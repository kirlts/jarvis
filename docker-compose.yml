# Jarvis v0.1.0 – Phase 1 Local Sandbox
# Covers: TASK-001 Docker Compose & Infrastructure Provisioning
# Validated checks: CORE.AV.01, CORE.CR.01, CORE.RS.02, DB.AV.01, DB.CR.02, STOR.AV.01
#
# Stack versions verified via Deep Research – April 2026:
#   PostgreSQL 17.6.1.093 (Supabase, ghcr.io)
#   PgBouncer 1.25.1 (edoburu, Alpine)
#   MinIO RELEASE.2026-04-14T21-32-45Z (source build)

services:
  # ── PostgreSQL 17 (vanilla Alpine for sandbox) ──────────────────────
  # Production uses Supabase managed PG. Sandbox uses vanilla PG 17
  # to avoid supabase_admin role dependency during extension creation.
  db:
    image: postgres:17-alpine
    container_name: jarvis-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_sandbox
      POSTGRES_DB: jarvis
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jarvis"]
      interval: 3s
      timeout: 5s
      retries: 10
    networks:
      - jarvis-net

  # ── PgBouncer (Supavisor emulator – transaction mode) ──────────────
  # edoburu/pgbouncer hardcodes internal listener to port 5432.
  # External mapping 6543:5432 emulates Supabase Supavisor (§4.5).
  # pg-boss workers MUST bypass this pooler (session-level advisory locks).
  pooler:
    image: edoburu/pgbouncer:latest
    container_name: jarvis-pooler
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres_sandbox
      DB_NAME: jarvis
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - jarvis-net

  # ── S3-Compatible Storage (MinIO, community build) ──────────────────
  # Official Docker Hub images archived since late 2025.
  # Using coollabsio automated source-build from official MinIO repo.
  storage:
    image: ghcr.io/coollabsio/minio:latest
    container_name: jarvis-storage
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_sandbox
    command: server /data --console-address ":9001"
    volumes:
      - storage_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc alias set local http://localhost:9000 minioadmin minioadmin_sandbox >/dev/null 2>&1 && mc ready local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jarvis-net

  # ── Storage Bootstrap (creates default bucket) ─────────────────────
  storage-init:
    image: ghcr.io/coollabsio/minio:latest
    container_name: jarvis-storage-init
    depends_on:
      storage:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_sandbox
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://storage:9000 minioadmin minioadmin_sandbox;
      mc mb local/jarvis-files --ignore-existing;
      mc anonymous set none local/jarvis-files;
      mc mb local/jarvis-private --ignore-existing;
      mc anonymous set none local/jarvis-private;
      echo 'Buckets jarvis-files and jarvis-private ready';
      "
    networks:
      - jarvis-net

  # ── Core HTTP API (Fastify VSA) ────────────────────────────────────────
  core-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis-core-api
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres_sandbox
      DB_NAME: jarvis
      POOLER_HOST: pooler
      POOLER_PORT: "5432"
      STORAGE_ENDPOINT: "http://storage:9000"
      STORAGE_ACCESS_KEY: "minioadmin"
      STORAGE_SECRET_KEY: "minioadmin_sandbox"
      STORAGE_BUCKET: "jarvis-files"
      BOSS_DATABASE_URL: "postgresql://postgres:postgres_sandbox@db:5432/jarvis"
